syntax = "proto3";

package lance.table;

/// A sequence of row latest update versions. Similar to RowIdSequence but tracks
/// the latest update version for each row. This is optimized for different patterns
/// of version assignment: uniform (all rows same version), incremental (consecutive
/// versions), or sparse (irregular version patterns).
message RowLatestUpdateVersionSequence {
    repeated RowVersionSegment segments = 1;
}

/// Different ways to encode row version information, optimized for common patterns.
message RowVersionSegment {
    /// Uniform range: consecutive rows with the same version number.
    /// This is the most common case when rows are inserted in batches.
    message UniformRange {
        /// The start row ID, inclusive.
        uint64 start_row = 1;
        /// The end row ID, exclusive.
        uint64 end_row = 2;
        /// The version number for all rows in this range.
        uint64 version = 3;
    }

    /// Incremental range: consecutive rows with incrementally increasing versions.
    /// This occurs when rows are updated in sequence.
    message IncrementalRange {
        /// The start row ID, inclusive.
        uint64 start_row = 1;
        /// The end row ID, exclusive.
        uint64 end_row = 2;
        /// The version number for the first row (start_row).
        /// Subsequent rows have version = start_version + (row_id - start_row).
        uint64 start_version = 3;
    }

    /// Sparse storage: discrete (row_id, version) pairs.
    /// Used when version patterns are irregular.
    message SparseVersions {
        repeated RowVersionPair pairs = 1;
    }

    /// A single (row_id, version) pair.
    message RowVersionPair {
        uint64 row_id = 1;
        uint64 version = 2;
    }

    oneof segment {
        /// When consecutive rows have the same version.
        UniformRange uniform_range = 1;
        /// When consecutive rows have incrementally increasing versions.
        IncrementalRange incremental_range = 2;
        /// When version patterns are irregular.
        SparseVersions sparse = 3;
    }
}
