[package]
name = "lance-namespace"
version = "0.38.1"
edition = "2021"
authors = ["Lance Namespace Contributors"]
description = "Lance Namespace Rust Client - A unified interface for managing namespaces and tables"
license = "Apache-2.0"
repository = "https://github.com/lancedb/lance"
documentation = "https://docs.rs/lance-namespace"
keywords = ["lance", "namespace", "table", "database"]
categories = ["database"]

[dependencies]
async-trait = { workspace = true }
thiserror = "1.0"
bytes = { workspace = true }
reqwest = { version = "0.12", default-features = false, features = [
    "json",
    "charset",
    "gzip",
    "http2",
    "stream",
    "rustls-tls-native-roots"
] }
serde_json = { workspace = true }
url = { workspace = true }
arrow = { workspace = true }

# Use models from the reqwest client
lance-namespace-reqwest-client = { path = "../../../lance-namespace/rust/lance-namespace-reqwest-client", version = "0.0.17" }

[dev-dependencies]
tokio = { workspace = true }
wiremock = "0.6"
tempfile = { workspace = true }
